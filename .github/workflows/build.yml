name: Build Workflow

on:
  push:
    branches: master

jobs:
  build-windows:
    runs-on: windows-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v1
      - name: Install Python
        uses: actions/setup-python@v1
        with:
          python-version: '3.12'
          architecture: 'x64'
      - name: Install requirements
        run: |
          pip install -r npc_generator_for_cp_red/requirements.txt
      - name: Run PyInstaller
        run: |
          python -m PyInstaller npc_generator_for_cp_red/npc_generator_for_cp_red.spec
      - name: Zip files
        shell: pwsh
        run: |
          Copy-Item settings.example.json dist/settings.json
          Compress-Archive -Path npc_generator_for_cp_red/configs, dist/npc_generator_for_cp_red.exe, dist/settings.json -Destination npc_generator_for_cp_red.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows_npc_generator_for_cp_red
          path: npc_generator_for_cp_red.zip
      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: dev-${{ github.run_id }}
          release_name: Actual master binaries
          body: |
            Commit:

            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{steps.create_release.outputs.upload_url}}
          asset_path: npc_generator_for_cp_red.zip
          asset_name: npc_generator_for_cp_red.zip
          asset_content_type: application/zip